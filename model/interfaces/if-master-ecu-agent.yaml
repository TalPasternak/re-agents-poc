id: if-master-ecu-agent
entity_type: INTERFACE
title: In-vehicle bus (Master Update ECU–Target ECU Update Agent)
description: >-
  The in-vehicle communication bus over which the Master Update ECU distributes
  per-module sub-packages and install/rollback orchestration commands to each
  Target ECU Update Agent, and over which the agents report per-module status.
  Internal–internal interface.
interface_type: MESSAGE_BUS
protocol: Automotive bus (e.g. CAN / Automotive Ethernet) with UDS
connected_component_ids: [c-master-update-ecu, c-target-ecu-update-agent]
tags: [ota, vehicle]
provenance:
  activity: context
  mode: 1
  rationale: In-vehicle orchestration channel between master ECU and agents (confirmed).
