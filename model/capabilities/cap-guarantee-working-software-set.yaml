id: cap-guarantee-working-software-set
entity_type: CAPABILITY
title: Guarantee a working software set via safe defaults
description: >-
  Ensure that on any abort, failure, or undefined state the vehicle falls back to
  a complete, mutually-compatible, known-good software set (safe defaults), so it
  is never left non-functional.
tags: [ota, safety, cross-cutting]
