id: cap-dual-bank-partitioning
entity_type: CAPABILITY
title: Maintain A/B (dual-bank) software partitions
description: >-
  Hold the running software in one bank while writing the update to an inactive
  bank, switching banks only once the new image is validated, so a known-good
  software set is always retained.
tags: [ota, safety, cross-cutting]
