id: cap-trigger-coordinated-rollback
entity_type: CAPABILITY
title: Trigger coordinated all-or-nothing rollback
description: >-
  On detecting any module failure, command every module's agent to roll back to
  its previous working image so the whole vehicle reverts together (all-or-nothing).
