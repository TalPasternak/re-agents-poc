id: c-system-ota
entity_type: COMPONENT
title: OTA Update System
description: >-
  The overall Over-The-Air software update system for a customer's vehicle
  fleet. It spans the whole OTA chain — from the cloud back-end through the
  in-vehicle Master Update ECU down to the per-module update agents — and is
  responsible for delivering, installing, verifying, and (when needed) rolling
  back vehicle software while guaranteeing the vehicle never ends up
  non-functional.
component_type: SYSTEM
boundary: INTERNAL
tags: [ota, umbrella]
