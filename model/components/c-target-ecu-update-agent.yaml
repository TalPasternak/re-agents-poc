id: c-target-ecu-update-agent
entity_type: COMPONENT
title: Target ECU Update Agent
description: >-
  The update software resident on each target ECU — a bootloader plus a runtime
  update engine. It receives its module sub-package from the Master Update ECU,
  installs/flashes it onto the target ECU, verifies the installed module, and
  can roll back its own module. Modelled as one generic component representing
  the role replicated across the three target modules.
component_type: SUBSYSTEM
boundary: INTERNAL
tags: [ota, vehicle, agent, bootloader]
provenance:
  activity: context
  mode: 1
  rationale: One generic component for the per-module update-agent role (confirmed).
