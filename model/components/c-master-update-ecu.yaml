id: c-master-update-ecu
entity_type: COMPONENT
title: Master Update ECU
description: >-
  The dedicated in-vehicle ECU that downloads the update package, validates it,
  and orchestrates the multi-module installation onto the target ECUs. It backs
  up current images, coordinates the all-or-nothing rollback if any module
  fails, and reports overall vehicle update status back to the back-end.
  Package storage is internal to this ECU (no separate storage component).
component_type: SUBSYSTEM
boundary: INTERNAL
tags: [ota, vehicle, orchestrator]
provenance:
  activity: context
  mode: 1
  rationale: In-vehicle orchestrator ECU; storage modelled inside it (confirmed).
