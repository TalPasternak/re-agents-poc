id: req-detect-module-timeout
entity_type: REQUIREMENT
title: Bound module install/verify wait time
description: >-
  The system shall treat a target module whose install or verification has not
  reported completion within its configured per-module timeout as a failed module.
requirement_type: NON_FUNCTIONAL
priority: HIGH
tags: [ota, timing, rollback]
